{% extends "base.html" %}

{% block head %}
    <title>Upload Document - AI Study Assistant</title>
{% endblock %}

{% block content %}
<div class="layout">
    <div class="header3">
        <div class="menu">☰</div>
        <div class="title">Upload Document</div>
    </div>

    <div class="upload-section">
        <div class="upload-instructions">
            <p>Upload your notes or PDF documents for AI processing.</p>
            <p>Supported formats: .txt, .pdf</p>
        </div>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="document" accept=".txt,.pdf" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <div>
    <a href="/" class="back-link">← Back to Home</a>
    </div>
</div>
{% endblock %}
