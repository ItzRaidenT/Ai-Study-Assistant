{% extends "base.html" %}

{% block head %}
    <title>Register - AI Study Assistant</title>
{% endblock %}

{% block content %}
<div class="layout">
    <div class="header2">
        <div class="menu">☰</div>
        <div class="title">Register</div>
    </div>

    <div class="downer">
        <div class="login_container">
            <form method="POST" action="/register">
                <h1>Create an Account</h1>
                <p>Please fill in the details below to create your account.</p>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email   :</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                
                <button class="btn btn-primary btn-full" id="registerBtn" onclick="handleRegister()">
                    Create Account
                </button>

                <p class="auth-switch">
                    Have an account? <a href="/login" class="link">Log in</a>
                </p>
            </form>
        </div>
    </div>
</div>
<script>
    async function handleRegister() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm_password').value.trim();

        if (!username || !email || !password || !confirmPassword) {
            alert('Please fill in all fields');
            return;
        }

        if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }

        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ username, email, password })
        });

        if (response.ok) {
            window.location.href = '/register';
        } else {
            const errorData = await response.json();
            alert(errorData.error || 'Registration failed');
        }
    }
</script>
{% endblock %}
