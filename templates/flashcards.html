{% extends "base.html" %}

{% block head %}
<title>Flashcards - AI Study Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='flashcard.css') }}">
{% endblock %}

{% block content %}

<div class="layout">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
        <div class="close-btn" onclick="toggleMenu()">✖</div>
        <h2>Hi 👋</h2>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="menu" onclick="toggleMenu()">☰</div>
    </div>

    <!-- MAIN -->
    <main class="main">
        <div class="page-header">
            <h1>Flashcards</h1>
            <p>Generate and study smart Q&amp;A cards from your documents.</p>
        </div>
        
          <a href="/" class="back-link">← Back to Home</a>

        <div class="error-msg" id="errorMsg"></div>

        <div class="controls-bar">
            <div class="ctrl-group">
                <label>Document</label>
                <select id="docSelect">
                    <option value="">— Select a document —</option>
                </select>
            </div>

            <div class="ctrl-group" style="max-width:100px;">
                <label>Cards</label>
                <input type="number" id="cardCount" value="10" min="3" max="20"/>
            </div>

            <button class="btn-generate" id="generateBtn" onclick="doGenerate()">◈ Generate</button>
        </div>

        <div id="mainArea">
            <div class="empty-state">
                <div class="big-icon">🃏</div>
                <p>Select a document and click Generate to create flashcards.</p>
            </div>
        </div>
    </main>

</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("active");
}

let cards = [];
let current = 0;
let viewMode = 'study';

async function loadDocs(){
    try{
        const r = await fetch('/documents');
        const d = await r.json();

        if(!d.success) return;

        const sel = document.getElementById('docSelect');

        d.documents.forEach(doc=>{
            const opt = document.createElement('option');
            opt.value = doc.id;
            opt.textContent = `${doc.filename} (${doc.word_count} words)`;
            sel.appendChild(opt);
        });

    }catch(e){}
}

async function doGenerate(){
    const docId = document.getElementById('docSelect').value;
    const count = parseInt(document.getElementById('cardCount').value) || 10;

    const err = document.getElementById('errorMsg');
    err.classList.remove('show');

    if(!docId){
        err.textContent = 'Please select a document.';
        err.classList.add('show');
        return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;

    document.getElementById('mainArea').innerHTML = `
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Generating ${count} flashcards…</p>
        </div>
    `;

    try{
        const r = await fetch('/api/flashcards',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                file_id:parseInt(docId),
                count
            })
        });

        const d = await r.json();

        if(d.success && d.flashcards.length){
            cards = d.flashcards;
            current = 0;
            renderStudyView();
        } else {
            document.getElementById('mainArea').innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">⚠️</div>
                    <p>${d.error || 'No flashcards generated.'}</p>
                </div>
            `;
        }

    }catch(e){
        document.getElementById('mainArea').innerHTML = `
            <div class="empty-state">
                <div class="big-icon">⚠️</div>
                <p>Network error. Please try again.</p>
            </div>
        `;
    }

    btn.disabled = false;
}

function renderStudyView(){
    document.getElementById('mainArea').innerHTML = `
        <div class="study-area show">
            <h3>Flashcards Ready (${cards.length})</h3>
            <p>Use arrow keys or click to navigate.</p>
        </div>
    `;
}

loadDocs();
</script>

{% endblock %}
