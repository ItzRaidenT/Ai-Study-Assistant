{% extends "base.html" %}

{% block head %}
    <title>Login - AI Study Assistant</title>
{% endblock %}

{% block content %}
<div class="layout">
    <div class="header2">
        <div class="menu">☰</div>
        <div class="title">Login</div>
    </div>

    <div class="downer">
        <div class="login_container">
            <div class="alert" id="alertBox" style="display:none;"></div>
            
            <form method="POST" action="/api/login" >
                <h1>Welcome Back</h1>
                <p>Please sign in to your account.</p>
                <div class="form-group">
                    <label for="username">Username or Email:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
                    Log In
                </button>
                <p class="auth-switch">
                    Don't have an account? <a href="/register" class="link">Create one</a>
                </p>
            </form>
        </div>
    </div>
</div>
<script>
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('loginBtn');

      function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = 'alert alert-' + type;
      box.style.display = 'block';
    }

      if (!email || !password) {
        showAlert('Please fill in all fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/', 800);
        } else {
          showAlert(data.error, 'error');
          btn.disabled = false;
          btn.textContent = 'Log In';
        }
      } catch {
        showAlert('Connection error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }

    

</script>
{% endblock %}
